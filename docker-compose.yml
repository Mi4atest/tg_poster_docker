version: '3.8'

services:
  app:
    build: .
    container_name: tg_poster_app
    restart: always
    volumes:
      - ./media:/app/media
      - ./.env:/app/.env
    depends_on:
      - db
    networks:
      - tg_poster_network
    # Убираем публичное открытие порта для API
    # ports:
    #   - "8002:8002"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/tg_poster
      - API_HOST=0.0.0.0
      - API_PORT=8002

  db:
    image: postgres:14-alpine
    container_name: tg_poster_db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_DB=${DB_NAME:-tg_poster}
    networks:
      - tg_poster_network
    # Убираем публичное открытие порта для базы данных
    # ports:
    #   - "5432:5432"

  nginx:
    image: nginx:alpine
    container_name: tg_poster_nginx
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./media:/app/media
      - ./nginx/modsecurity:/etc/nginx/modsecurity
    depends_on:
      - app
    networks:
      - tg_poster_network
    ports:
      - "80:80"
      - "443:443"

networks:
  tg_poster_network:
    driver: bridge
    # Настройка внутренней сети без доступа извне
    internal: true

volumes:
  postgres_data:
